version: 2

builds:
  - main: ./cmd/mmdp
    binary: mmdp
    ldflags:
      - -s -w -X github.com/mxcoppell/mmdp/internal/version.Version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - skills/mmdp.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

homebrew_casks:
  - repository:
      owner: mxcoppell
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: mmdp
    homepage: https://github.com/mxcoppell/mmdp
    description: CLI tool for previewing Mermaid diagrams
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mmdp"]
          end
