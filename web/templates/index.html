<!DOCTYPE html>
<html lang="en" data-theme="{{.Theme}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Filename}} — mermaid-preview</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/mermaid.min.js"></script>
</head>
<body>
    <!-- Toolbar -->
    <header id="toolbar">
        <div class="toolbar-left">
            <span id="filename" class="filename">{{.Filename}}</span>
        </div>
        <div class="toolbar-center">
            <div id="search-bar" class="search-bar hidden">
                <input type="text" id="search-input" placeholder="Search nodes..." autocomplete="off">
                <span id="search-count" class="search-count"></span>
                <button id="search-prev" class="btn-icon" title="Previous (Shift+Enter)">&#9650;</button>
                <button id="search-next" class="btn-icon" title="Next (Enter)">&#9660;</button>
                <button id="search-close" class="btn-icon" title="Close (Esc)">&times;</button>
            </div>
        </div>
        <div class="toolbar-right">
            <span id="zoom-level" class="zoom-level">Fit</span>
            <button id="zoom-in" class="btn-icon" title="Zoom in (+)">+</button>
            <button id="zoom-out" class="btn-icon" title="Zoom out (-)">−</button>
            <button id="zoom-reset" class="btn-icon" title="Reset zoom (0)">⊙</button>
            <button id="theme-toggle" class="btn-icon" title="Toggle theme (T)">◐</button>
            <div class="dropdown">
                <button id="export-btn" class="btn-icon" title="Export">⤓</button>
                <div id="export-menu" class="dropdown-menu hidden">
                    <button id="export-svg">Export SVG</button>
                    <button id="export-png">Export PNG</button>
                    <button id="export-print">Print</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Disconnected banner -->
    <div id="disconnected-banner" class="disconnected-banner hidden">
        Disconnected — reconnecting...
    </div>

    <!-- Error overlay -->
    <div id="error-overlay" class="error-overlay hidden">
        <div class="error-content">
            <strong>Parse Error</strong>
            <pre id="error-message"></pre>
        </div>
    </div>

    <!-- Diagram container -->
    <main id="diagram-container" class="diagram-container">
        <div id="diagram-wrapper" class="diagram-wrapper">
            <div id="diagram"></div>
        </div>
    </main>

    <!-- Status bar -->
    <footer id="status-bar" class="status-bar">
        <span id="status-type"></span>
        <span id="status-nodes"></span>
        <span id="status-updated"></span>
    </footer>

    <!-- Config injected from server -->
    <script>
        window.__CONFIG__ = {
            theme: "{{.Theme}}",
            filename: "{{.Filename}}",
            isMarkdown: {{.IsMarkdown}},
            blocks: {{.Blocks}},
            noWatch: {{.NoWatch}}
        };
    </script>
    <script src="/static/app.js"></script>
</body>
</html>
