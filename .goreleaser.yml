version: 2

builds:
  - main: .
    binary: mermaid-preview
    ldflags:
      - -s -w -X github.com/mxie/mermaid-preview/internal/version.Version={{.Version}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

brews:
  - repository:
      owner: mxie
      name: homebrew-tap
    name: mermaid-preview
    homepage: https://github.com/mxie/mermaid-preview-cli
    description: CLI tool for previewing Mermaid diagrams
    license: MIT
    install: |
      bin.install "mermaid-preview"

