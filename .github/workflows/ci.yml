name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go test ./...
      - run: go build -ldflags="-s -w" -o mmdp ./cmd/mmdp
      - name: Check binary size
        run: |
          size=$(stat -f%z mmdp 2>/dev/null || stat -c%s mmdp)
          echo "Binary size: $size bytes ($(echo "scale=1; $size/1048576" | bc)MB)"
          if [ "$size" -gt 12582912 ]; then echo "ERROR: binary exceeds 12MB" && exit 1; fi
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v6
        with:
          install-mode: goinstall
          version: v1.64.8
  e2e:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: go build -ldflags="-s -w" -o mmdp ./cmd/mmdp
      - run: cd e2e && npm ci && npx playwright install chromium
      - run: cd e2e && npx playwright test
